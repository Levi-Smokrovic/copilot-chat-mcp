<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Copilot Chat</title>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --border:#30363d;
    --fg:#e6edf3; --muted:#8b949e;
    --user:#238636; --asst:#1f6feb; --question:#d29922; --update:#6e7681;
  }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; background:var(--bg); color:var(--fg);
    font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  #app { display:flex; flex-direction:column; height:100%; max-width:820px; margin:0 auto; }
  header { padding:10px 16px; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center; }
  header h1 { font-size:14px; margin:0; font-weight:600; }
  #status { font-size:12px; color:var(--muted); }
  #log { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:82%; padding:8px 12px; border-radius:12px; white-space:pre-wrap;
    word-wrap:break-word; border:1px solid var(--border); }
  .msg .meta { font-size:11px; color:var(--muted); margin-bottom:2px; }
  .user  { align-self:flex-end; background:#0f2a18; border-color:var(--user); }
  .assistant { align-self:flex-start; background:#0d1f3a; border-color:var(--asst); }
  .question  { align-self:flex-start; background:#2a1f05; border-color:var(--question); }
  .update    { align-self:flex-start; background:#161b22; border-color:var(--update);
    color:var(--muted); font-style:italic; }
  form { display:flex; gap:8px; padding:12px; border-top:1px solid var(--border); }
  textarea { flex:1; resize:none; min-height:42px; max-height:160px; padding:10px;
    background:var(--panel); color:var(--fg); border:1px solid var(--border);
    border-radius:8px; font:inherit; }
  button { padding:0 16px; border:0; border-radius:8px; background:var(--asst);
    color:#fff; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:not-allowed; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Copilot Chat</h1>
    <span id="status">connecting…</span>
  </header>
  <div id="log"></div>
  <form id="form">
    <textarea id="input" placeholder="Type a message… (Enter to send, Shift+Enter for newline)" autofocus></textarea>
    <button id="send" type="submit">Send</button>
  </form>
</div>
<script>
const logEl = document.getElementById('log');
const statusEl = document.getElementById('status');
const input = document.getElementById('input');
const form = document.getElementById('form');
let ws = null;

function fmt(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleTimeString();
}

function render(m) {
  const el = document.createElement('div');
  let cls = m.role;
  if (m.kind === 'question') cls = 'question';
  else if (m.kind === 'update') cls = 'update';
  el.className = 'msg ' + cls;
  const who = m.role === 'user'
    ? (m.source === 'telegram' ? 'you · telegram' : 'you · web')
    : (m.kind === 'question' ? 'copilot · question' : (m.kind === 'update' ? 'copilot · update' : 'copilot'));
  el.innerHTML = '<div class="meta"></div><div class="body"></div>';
  el.querySelector('.meta').textContent = who + ' · ' + fmt(m.ts);
  el.querySelector('.body').textContent = m.text;
  logEl.appendChild(el);
  logEl.scrollTop = logEl.scrollHeight;
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen = () => { statusEl.textContent = 'connected'; };
  ws.onclose = () => {
    statusEl.textContent = 'disconnected — retrying…';
    setTimeout(connect, 1500);
  };
  ws.onerror = () => { try { ws.close(); } catch(e){} };
  ws.onmessage = ev => {
    try { render(JSON.parse(ev.data)); } catch(e) { console.error(e); }
  };
}
connect();

function send() {
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ text }));
  input.value = '';
}
form.addEventListener('submit', e => { e.preventDefault(); send(); });
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
</script>
</body>
</html>
